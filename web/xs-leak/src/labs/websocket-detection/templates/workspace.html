<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>__COMPANY_NAME__ workspace</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 28px;
      line-height: 1.5;
      color: #111827;
      background: #f8fafc;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.06);
    }

    code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 0.95em;
    }

    .muted {
      color: #475569;
    }

    .panel {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px;
      background: #f8fafc;
      margin: 12px 0;
    }

    .ok {
      color: #166534;
      font-weight: 700;
    }

    .warn {
      color: #b45309;
      font-weight: 700;
    }

    .danger {
      color: #b91c1c;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>__COMPANY_NAME__ workspace</h1>
    <p>현재 상태: <span class="__STATE_CLASS__">__STATE_LABEL__</span></p>
    <p>
      <a href="/login">로그인</a> / <a href="/logout">로그아웃</a>
    </p>

    <div class="panel">
      <p>이 페이지는 "로그인 상태일 때만" <code>/workspace-ws</code> WebSocket 을 엽니다.</p>
      <p>클라이언트 관측 상태: <span id="ws-state" class="muted">not connected</span></p>
    </div>
  </main>

  <script>
    const shouldConnect = __SHOULD_CONNECT__;

    if (shouldConnect) {
      const status = document.getElementById('ws-state');
      const ws = new WebSocket('ws://' + location.host + '/workspace-ws');
      ws.onopen = () => {
        status.textContent = 'connected';
        status.className = 'ok';
      };
      ws.onclose = () => {
        if (status.textContent !== 'connected') {
          status.textContent = 'closed';
          status.className = 'danger';
        }
      };
      ws.onerror = () => {
        status.textContent = 'error';
        status.className = 'danger';
      };
      window.__presenceSocket = ws;
    }
  </script>
</body>
</html>
