<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Banned Download Lab</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 28px;
      line-height: 1.5;
      color: #111827;
      background: #f8fafc;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.06);
    }

    code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 0.95em;
    }

    .panel {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px;
      background: #f8fafc;
      margin: 12px 0;
    }

    .muted {
      color: #475569;
    }
  </style>
</head>
<body>
  <main>
    <h1>Banned 서비스 (Download Detection 실험용)</h1>
    <p>__MAIN_MESSAGE__</p>

    <div class="panel">
      <p>관측 대상 엔드포인트: <code>/</code></p>
      <p>__DETAIL_MESSAGE__</p>
      <p>Attacker 페이지: <code>__ATTACKER_URL__</code></p>
    </div>

    <p class="muted">이 페이지는 방문 쿠키가 있는 사용자에게만 표시됩니다.</p>
  </main>
</body>
</html>
